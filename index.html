<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Treino · Sabrina</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Archivo+Black&family=Manrope:wght@400;500;600;700;800&display=swap');

  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { margin: 0; padding: 0; }
  body {
    font-family: 'Manrope', sans-serif;
    background: radial-gradient(circle at 50% 0%, #F3EEE2 0%, #EFEAE0 60%);
    min-height: 100vh;
    display: flex;
    justify-content: center;
  }
  input, select, button { font-family: 'Manrope', sans-serif; outline: none; }
  input::placeholder { color: #B9A9CC; }
  button { cursor: pointer; }

  :root {
    --cream: #FAF6EC;
    --ink: #241333;
    --purple: #4B1D6E;
    --purple-deep: #2E1049;
    --purple-soft: #EDE3F5;
    --yellow: #F8C300;
    --yellow-soft: #FDF0BE;
    --muted: #8577A0;
    --muted-light: #B09FC7;
    --border: #E4D8F0;
  }

  .phone {
    width: 100%; max-width: 460px; min-height: 100vh; background: var(--cream);
    position: relative; display: flex; flex-direction: column;
    box-shadow: 0 0 60px rgba(46,16,73,0.12);
  }

  .topbar {
    background: var(--purple-deep); padding: 18px 18px 16px 18px;
    border-bottom: 3px solid var(--yellow); flex-shrink: 0;
  }
  .topbar-title {
    font-family: 'Archivo Black', sans-serif; color: var(--cream); font-size: 22px; line-height: 1.1;
  }

  .content { flex: 1; overflow-y: auto; padding: 16px 18px 100px 18px; }

  .bottomnav {
    position: sticky; bottom: 0; left: 0; right: 0; background: var(--cream);
    border-top: 1px solid var(--purple-soft); display: flex; flex-shrink: 0;
    box-shadow: 0 -6px 18px rgba(46,16,73,0.06);
  }
  .navbtn {
    flex: 1; border: none; background: transparent; padding: 10px 0 8px 0;
    display: flex; flex-direction: column; align-items: center; gap: 3px;
  }
  .navbtn .icon { font-size: 19px; line-height: 1; opacity: 0.55; }
  .navbtn.active .icon { opacity: 1; }
  .navbtn .lbl { font-size: 10px; font-weight: 600; color: var(--muted-light); }
  .navbtn.active .lbl { font-weight: 800; color: var(--purple); }
  .navdot { width: 4px; height: 4px; border-radius: 2px; background: var(--yellow); margin-top: 1px; }

  .card {
    background: #FFFFFF; border-radius: 16px; padding: 16px; border: 1px solid var(--border);
    box-shadow: 0 2px 10px rgba(46,16,73,0.04);
  }
  .section-label {
    font-family: 'Archivo Black', sans-serif; font-size: 11px; letter-spacing: 1.5px; color: var(--purple);
    margin-bottom: 10px; margin-top: 22px; text-transform: uppercase;
  }
  .section-label.no-top { margin-top: 0; }

  .tip-banner {
    background: var(--purple); border-radius: 16px; padding: 14px 16px; display: flex; gap: 10px;
    align-items: flex-start; margin-bottom: 18px; box-shadow: 0 4px 14px rgba(75,29,110,0.25);
  }
  .tip-banner .icon { flex-shrink: 0; margin-top: 1px; font-size: 16px; }
  .tip-label { font-family: 'Archivo Black', sans-serif; color: var(--yellow); font-size: 10.5px; letter-spacing: 1px; margin-bottom: 3px; }
  .tip-text { color: #F5EEFB; font-size: 13px; line-height: 1.45; }

  .scoreboard {
    background: var(--purple-deep); border-radius: 18px; padding: 16px; position: relative; overflow: hidden; margin-bottom: 18px;
  }
  .scoreboard::before {
    content: ''; position: absolute; top: -30px; right: -30px; width: 100px; height: 100px;
    border-radius: 50%; background: rgba(248,195,0,0.08);
  }
  .scoreboard-label { color: #C9B8DE; font-size: 11px; font-weight: 700; letter-spacing: 1.5px; margin-bottom: 4px; }
  .scoreboard-num { font-family: 'Archivo Black', sans-serif; color: var(--yellow); font-size: 38px; line-height: 1; }
  .scoreboard-total { color: #C9B8DE; font-size: 14px; font-weight: 700; margin-left: 8px; }
  .scoreboard-dots { display: flex; gap: 4px; margin-top: 12px; }
  .dot { flex: 1; height: 8px; border-radius: 4px; border: none; background: rgba(255,255,255,0.12); }
  .dot.past { background: rgba(248,195,0,0.35); }
  .dot.current { background: var(--yellow); }

  .day-pills { display: flex; gap: 8px; margin-bottom: 16px; overflow-x: auto; padding-bottom: 2px; }
  .pill {
    flex-shrink: 0; display: flex; align-items: center; gap: 6px; padding: 9px 14px; border-radius: 20px;
    border: 1.5px solid var(--border); background: #FFFFFF; font-weight: 800; font-size: 12.5px; color: var(--purple);
  }
  .pill.active { border-color: var(--purple); background: var(--purple); color: var(--yellow); }
  .pill.complete:not(.active) { border-color: var(--yellow); }

  .row-summary { display: flex; justify-content: space-between; align-items: center; margin-bottom: 4px; }
  .row-summary .count { font-size: 12.5px; color: var(--muted); font-weight: 700; }
  .row-summary .done-flag { display: flex; align-items: center; gap: 4px; color: #B78A00; font-size: 12px; font-weight: 800; }

  .exercise-row { background: #FFFFFF; border: 1px solid var(--border); border-radius: 14px; padding: 12px; margin-bottom: 10px; }
  .exercise-row.checked { border-color: var(--yellow); }
  .exercise-top { display: flex; align-items: flex-start; gap: 10px; }
  .checkbox {
    width: 24px; height: 24px; border-radius: 7px; flex-shrink: 0; margin-top: 1px;
    border: 2px solid #D9CBEB; background: transparent; display: flex; align-items: center; justify-content: center;
    font-size: 13px; color: var(--purple-deep); font-weight: 900; padding: 0;
  }
  .checkbox.checked { border-color: var(--yellow); background: var(--yellow); }
  .ex-name { font-weight: 800; font-size: 13.5px; color: var(--ink); }
  .ex-name.checked { text-decoration: line-through; opacity: 0.55; }
  .ex-meta { font-size: 11.5px; color: var(--muted); margin-top: 1px; }
  .ex-obj { font-size: 11px; color: var(--muted-light); margin-top: 1px; }
  .ex-weight-row { display: flex; align-items: center; gap: 8px; margin-top: 10px; margin-left: 34px; }
  .ex-weight-row input {
    width: 100px; border: 1.5px solid var(--border); border-radius: 9px; padding: 6px 9px;
    font-size: 12.5px; font-weight: 700; color: var(--ink);
  }
  .ex-prev { font-size: 11px; color: var(--muted-light); }

  .cardio-card { display: flex; align-items: center; gap: 12px; }
  .cardio-icon {
    width: 40px; height: 40px; border-radius: 10px; background: var(--yellow-soft);
    display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 18px;
  }
  .cardio-dur { font-weight: 800; font-size: 13.5px; color: var(--ink); }
  .cardio-desc { font-size: 12px; color: var(--muted); }

  .rpe-row { display: flex; justify-content: space-between; padding: 7px 0; border-top: 1px solid #F3EDFA; }
  .rpe-row:first-child { border-top: none; }
  .rpe-code { font-weight: 800; font-size: 12.5px; color: var(--purple); }
  .rpe-label { font-size: 12.5px; color: #6B5A80; }

  .guide-item { background: #FFFFFF; border-radius: 14px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 8px; }
  .guide-item.open { border-color: var(--purple); }
  .guide-header {
    width: 100%; display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px; background: transparent; border: none; text-align: left;
  }
  .guide-name { font-weight: 800; font-size: 13.5px; color: var(--ink); }
  .guide-foco { font-size: 11.5px; color: var(--muted); }
  .chevron { font-size: 14px; color: var(--purple); transition: transform .2s; flex-shrink: 0; }
  .chevron.rot { transform: rotate(180deg); }
  .guide-body { padding: 0 14px 14px 14px; display: flex; flex-direction: column; gap: 8px; }
  .guide-line-label { font-family: 'Archivo Black', sans-serif; font-size: 9.5px; letter-spacing: 1px; margin-bottom: 2px; }
  .guide-line-text { font-size: 12.5px; color: #4A3B5C; line-height: 1.45; }

  .info-row { display: flex; justify-content: space-between; align-items: center; gap: 10px; padding: 10px 0; border-bottom: 1px solid #F3EDFA; }
  .info-row:last-child { border-bottom: none; }
  .info-label { font-size: 12.5px; font-weight: 700; color: var(--muted); }
  .info-value { font-size: 13px; font-weight: 700; color: var(--ink); text-align: right; max-width: 62%; }

  .field { margin-bottom: 12px; }
  .field-label { font-size: 11px; font-weight: 700; color: var(--muted); margin-bottom: 5px; }
  .field-box { display: flex; align-items: center; border: 1.5px solid var(--border); border-radius: 10px; padding: 9px 12px; }
  .field-box input { border: none; flex: 1; min-width: 0; font-size: 13.5px; font-weight: 700; color: var(--ink); background: transparent; }
  .field-suffix { font-size: 12px; color: var(--muted-light); font-weight: 700; flex-shrink: 0; margin-left: 6px; }

  .profile-header { background: var(--purple-deep); border-radius: 16px; padding: 16px; margin-bottom: 18px; display: flex; align-items: center; gap: 12px; }
  .profile-avatar { width: 46px; height: 46px; border-radius: 50%; background: var(--yellow); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .profile-avatar span { font-family: 'Archivo Black', sans-serif; color: var(--purple-deep); font-size: 18px; }
  .profile-name { color: #fff; font-weight: 800; font-size: 14.5px; }
  .profile-age { color: #C9B8DE; font-size: 11.5px; }

  .stat-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .stat-box { background: var(--purple-soft); border-radius: 12px; padding: 12px 10px; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 3px; }
  .stat-label { font-size: 10.5px; font-weight: 700; color: var(--purple); text-transform: uppercase; letter-spacing: 0.5px; }
  .stat-value { font-family: 'Archivo Black', sans-serif; font-size: 19px; color: var(--purple-deep); line-height: 1; }
  .stat-suffix { font-family: 'Manrope', sans-serif; font-size: 11px; font-weight: 700; color: var(--muted); margin-left: 2px; }

  .week-item { background: #fff; border-radius: 14px; border: 1px solid var(--border); overflow: hidden; margin-bottom: 8px; }
  .week-item.open { border-color: var(--purple); }
  .week-header { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 12px 14px; background: transparent; border: none; text-align: left; }
  .week-badge { width: 30px; height: 30px; border-radius: 8px; background: var(--purple-soft); display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
  .week-badge.full { background: var(--yellow); }
  .week-badge span { font-family: 'Archivo Black', sans-serif; font-size: 12px; color: var(--purple); }
  .week-title { font-weight: 800; font-size: 13.5px; color: var(--ink); }
  .week-fill { font-size: 11px; color: var(--muted-light); font-weight: 700; }
  .week-body { padding: 2px 14px 16px 14px; display: flex; flex-direction: column; gap: 12px; }
  .aval-row { display: flex; align-items: center; justify-content: space-between; gap: 10px; }
  .aval-label { font-size: 12.5px; font-weight: 700; color: #4A3B5C; }
  .scale-btns { display: flex; gap: 4px; }
  .scale-btn {
    width: 26px; height: 26px; border-radius: 50%; border: 1.5px solid var(--purple); background: transparent;
    color: var(--purple); font-weight: 700; font-size: 12px;
  }
  .scale-btn.active { background: var(--purple); color: var(--yellow); }
  .aval-row input[type=number] {
    width: 70px; border: 1.5px solid var(--border); border-radius: 8px; padding: 6px 9px; font-size: 12.5px; font-weight: 700; color: var(--ink);
  }

  .toast {
    position: fixed; bottom: 86px; left: 50%; transform: translateX(-50%) translateY(20px);
    opacity: 0; transition: all .25s ease; background: #241333; color: var(--yellow);
    padding: 8px 16px; border-radius: 20px; font-size: 12.5px; font-weight: 700;
    display: flex; align-items: center; gap: 6px; z-index: 50; box-shadow: 0 6px 18px rgba(36,19,51,.35);
    pointer-events: none;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
  .loading-screen { display: flex; align-items: center; justify-content: center; min-height: 100vh; color: #7A6690; font-size: 14px; }

  ::-webkit-scrollbar { width: 0px; height: 0px; }
</style>
</head>
<body>

<div id="app"></div>

<script>
// ---------------------------------------------------------------------------
// DATA — extraído da planilha de treino
// ---------------------------------------------------------------------------

const TOTAL_WEEKS = 12;

const RPE_SCALE = [
  { code: 'RPE 6', label: 'confortável' },
  { code: 'RPE 7', label: 'moderadamente difícil' },
  { code: 'RPE 8', label: 'difícil, mas com margem' },

  { code: 'RPE 10', label: 'esforço máximo' },

const DICA_GERAL = 'Mantenha a respiração controlada para a contração do abdômen — isso melhora a execução na maioria dos movimentos.';

const WORKOUTS = [
  {
    id: 'a', letter: 'A', title: 'Costas',
    exercises: [

      { id: 'a2', name: 'Puxada alta c/ barra', series: '3x10', rest: '1 min', intensity: 'RPE 7', objective: 'Desenvolvimento das costas' },
      { id: 'a3', name: 'Puxada alta c/ triângulo', series: '3x10', rest: '1 min', intensity: 'RPE 7', objective: 'Fortalecimento das dorsais' },

  {

      { id: 'b1', name: 'Mobilidade', series: '2 séries', rest: '45s', intensity: 'Leve', objective: 'Articulações', trackWeight: false },
      { id: 'b2', name: 'Cadeira extensora', series: '4x10', rest: '1 min', intensity: 'RPE 7', objective: 'Isolamento de quadríceps' },
      { id: 'b3', name: 'Leg press 45°', series: '3x10', rest: '1 min', intensity: 'RPE 7', objective: 'Força de quadríceps e glúteo' },
      { id: 'b4', name: 'Mesa flexora', series: '3x10', rest: '1 min', intensity: 'RPE 6', objective: 'Desenvolvimento de isquiotibiais' },
      { id: 'b5', name: 'Cadeira adutora', series: '4x10', rest: '1 min', intensity: 'RPE 7', objective: 'Ativação de adutores' },
      { id: 'b6', name: 'Panturrilha', series: '3x15', rest: '1 min', intensity: 'RPE 8', objective: 'Fortalecimento de panturrilha' },
    ],
    cardio: { duration: '30 min', desc: 'Bike HIIT — moderado (30s forte / 90s leve)' },
  },
  {
    id: 'c', letter: 'C', title: 'Peito, ombro e braço',
    exercises: [
      { id: 'c1', name: 'Mobilidade', series: '2 séries', rest: '45s', intensity: 'Leve', objective: 'Articulações', trackWeight: false },
      { id: 'c2', name: 'Peck deck', series: '3x10', rest: '1 min', intensity: 'RPE 7', objective: 'Isolamento do peitoral' },
      { id: 'c3', name: 'Desenvolvimento', series: '3x10', rest: '1 min', intensity: 'RPE 7', objective: 'Força de ombros' },
      { id: 'c4', name: 'Elevação lateral', series: '3x10', rest: '1 min', intensity: 'RPE 7', objective: 'Hipertrofia do deltoide lateral' },
      { id: 'c5', name: 'Bíceps martelo', series: '3x10', rest: '1 min', intensity: 'RPE 8', objective: 'Braquial e braquiorradial' },
      { id: 'c6', name: 'Tríceps corda na polia', series: '3x10', rest: '1 min', intensity: 'RPE 8', objective: 'Extensão e definição do tríceps' },
    ],
    funcional: {
      note: 'Circuito — 2 min de descanso entre voltas · gasto calórico',
      exercises: [
        { id: 'cf1', name: 'Agachamento livre', series: '3x15' },
        { id: 'cf2', name: 'Polichinelo', series: '3x20' },
        { id: 'cf3', name: 'Joelho x cotovelo', series: '3x15' },
        { id: 'cf4', name: 'Corridinho pra frente/trás', series: '3x1 min' },
      ],
    },
    cardio: { duration: '15 min', desc: 'Caminhada inclinada — velocidade 5 km/h' },
  },
  {
    id: 'd', letter: 'D', title: 'Funcional + Cardio',
    exercises: [
      { id: 'd1', name: 'Mobilidade', series: '2 séries', rest: '45s', intensity: 'Leve', objective: 'Articulações', trackWeight: false },
      { id: 'd2', name: 'Caminhada inclinada', series: '5 min', rest: '—', intensity: 'Leve', objective: 'Ativar circulação', trackWeight: false },
    ],
    funcional: {
      note: 'Circuito — 2 min30s de descanso entre blocos',
      exercises: [
        { id: 'df1', name: 'Agachamento c/ kettlebell', series: '10x', objective: 'Força de pernas' },
        { id: 'df2', name: 'Shoulder cars', series: '12 p/ lado', objective: 'Estabilidade e costas' },
        { id: 'df3', name: 'Step up em caixa', series: '10 p/ lado', objective: 'Força unilateral' },
        { id: 'df4', name: 'Marcha estacionária c/ joelho alto e tornozeleira', series: '30s', objective: 'Coordenação e cardio' },

    cardio: { duration: '20 min', desc: 'Caminhada inclinada — velocidade 5 km/h' },

const GUIDE = [
  { name: 'Mobilidade', foco: 'Articulações', como: 'Movimentos lentos e controlados, buscando amplitude sem compensação.', erro: 'Fazer rápido e com pouca amplitude.', dica: 'Priorize qualidade do movimento, não velocidade.' },
  { name: 'Puxada alta c/ barra', foco: 'Latíssimo do dorso', como: 'Puxe a barra em direção à parte superior do peito, mantendo o peito aberto e os cotovelos para baixo e para fora.', erro: 'Puxar atrás da cabeça ou balançar o corpo.', dica: 'Pense em aproximar os cotovelos do quadril, "esmagando" as costas.' },
  { name: 'Puxada alta c/ triângulo', foco: 'Desenvolvimento dos dorsais', como: 'Puxe o triângulo em direção ao peito, contraindo as escápulas e puxando os cotovelos para trás.', erro: 'Executar o movimento apenas com os braços.', dica: 'Inicie o movimento contraindo as escápulas.' },
  { name: 'Remada na máquina', foco: 'Costas', como: 'Mão em posição neutra, peito estufado; reme até o braço ficar na linha das costas.', erro: 'Girar o tronco ou ultrapassar demais a linha das costas.', dica: 'Movimento controlado, concentração na escápula.' },
  { name: 'Crucifixo inverso na máquina', foco: 'Deltoide posterior e parte alta das costas', como: 'Pegada supinada na linha do ombro; abra os braços até a linha das costas sem ultrapassar, segurando 1–2s.', erro: 'Jogar o corpo para trás ou usar impulso.', dica: 'Mantenha tensão contínua durante toda a série.' },
  { name: 'Cadeira extensora', foco: 'Quadríceps', como: 'Pés levemente para fora, sem estender totalmente os joelhos; desça controlado.', erro: 'Travar ou superestender os joelhos, pés relaxados.', dica: 'Suba contando até 2 e desça contando até 3.' },
  { name: 'Leg press 45°', foco: 'Quadríceps e glúteo', como: 'Pernas na linha do ombro, pés levemente para fora; empurre a plataforma.', erro: 'Tirar o quadril do banco ou superestender os joelhos.', dica: 'Pés firmes e lombar sempre apoiada no banco.' },
  { name: 'Mesa flexora', foco: 'Posterior de coxa', como: 'Flexione os joelhos aproximando os calcanhares dos glúteos e retorne devagar.', erro: 'Tirar o quadril do banco ou usar impulso.', dica: 'Controle a volta e mantenha o abdômen ativo.' },
  { name: 'Cadeira adutora', foco: 'Adutores da coxa', como: 'Segure a contração por 2s e solte de forma controlada, com peso moderado.', erro: 'Impulsionar demais ou bater os pesos.', dica: 'Aperte por 2 segundos no ponto de contração.' },
  { name: 'Panturrilha', foco: 'Panturrilhas', como: 'Suba o máximo possível, segure 2s e desça alongando bem.', erro: 'Movimento rápido ou com pouca amplitude.', dica: 'O que fortalece é a isometria e a amplitude do movimento.' },
  { name: 'Peck deck', foco: 'Peitoral', como: 'Banco na altura em que a mão fica na linha do peito; abra estufando e feche esmagando o peito.', erro: 'Encolher os ombros ou inclinar a cabeça para frente.', dica: 'Faça uma pequena pausa no ponto de contração.' },
  { name: 'Desenvolvimento', foco: 'Deltoides e estabilidade de ombros', como: 'Empurre os halteres para cima e retorne até a mão ficar na altura do nariz.', erro: 'Arquear demais a lombar ou abrir os braços para trás.', dica: 'Contraia o abdômen durante todo o movimento.' },
  { name: 'Elevação lateral', foco: 'Deltoide lateral', como: 'Braço levemente flexionado, suba somente até a altura do ombro.', erro: 'Encolher o ombro ou balançar o corpo.', dica: 'Mantenha os cotovelos levemente flexionados.' },

const DEFAULT_PERFIL = {
  nome: 'Sabrina Tolentino de Macedo', idade: '26', pesoAtual: '79',
  cintura: '88', quadril: '118', biceps: '29', coxa: '63',
  objetivo: 'Emagrecimento / massa muscular', obstaculo: 'Procrastinação',
};

const AVAL_FIELDS = [
  { key: 'frequencia', label: 'Frequência', type: 'number', placeholder: 'nº treinos' },
  { key: 'humor', label: 'Humor', type: 'scale' },
  { key: 'energia', label: 'Energia', type: 'scale' },
  { key: 'dificuldade', label: 'Dificuldade', type: 'scale' },
  { key: 'dor', label: 'Dor/desconforto', type: 'scale' },
  { key: 'sono', label: 'Sono', type: 'scale' },
  { key: 'alimentacao', label: 'Alimentação', type: 'scale' },
];

// ---------------------------------------------------------------------------
// STORAGE — usa window.storage (compartilhado) quando disponível, com
// fallback para localStorage se o arquivo for aberto fora do Claude.
// ---------------------------------------------------------------------------

async function loadKey(key, fallback) {
  try {
    if (window.storage && window.storage.get) {
      const res = await window.storage.get(key, true);
      return res ? JSON.parse(res.value) : fallback;
    }
    const v = localStorage.getItem(key);
    return v ? JSON.parse(v) : fallback;
  } catch (e) { return fallback; }
}

async function saveKey(key, value) {
  try {
    if (window.storage && window.storage.set) {
      await window.storage.set(key, JSON.stringify(value), true);
    } else {
      localStorage.setItem(key, JSON.stringify(value));
    }
    return true;
  } catch (e) { return false; }
}

// ---------------------------------------------------------------------------
// STATE
// ---------------------------------------------------------------------------

const state = {
  tab: 'treinos',
  week: 1,
  activeDay: 'a',
  perfil: JSON.parse(JSON.stringify(DEFAULT_PERFIL)),
  checkins: {},
  avaliacao: {},
  openGuide: null,
  openWeekEval: 1,
  loading: true,
};

let saveTimers = {};
function debouncedSave(key, value, delay) {
  clearTimeout(saveTimers[key]);
  saveTimers[key] = setTimeout(async () => {
    await saveKey(key, value);
    flashToast();
  }, delay || 400);
}

let toastTimer = null;
function flashToast() {
  const t = document.getElementById('toast');
  if (!t) return;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), 1200);
}

// ---------------------------------------------------------------------------
// HELPERS
// ---------------------------------------------------------------------------

function getExState(dayId, exId) {
  return (state.checkins[state.week] && state.checkins[state.week][dayId] && state.checkins[state.week][dayId][exId]) || { checked: false, carga: '' };
}

function dayCompletion(dayId, wk) {
  const w = wk || state.week;
  const workout = WORKOUTS.find(x => x.id === dayId);
  const total = workout.exercises.length;
  const wkData = state.checkins[w] && state.checkins[w][dayId];
  const done = workout.exercises.filter(ex => wkData && wkData[ex.id] && wkData[ex.id].checked).length;
  return { done, total };
}

function prevCarga(dayId, exId) {
  if (state.week <= 1) return null;
  const wkData = state.checkins[state.week - 1] && state.checkins[state.week - 1][dayId];
  const v = wkData && wkData[exId] && wkData[exId].carga;
  return v || null;
}

function esc(s) {
  return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
}

// ---------------------------------------------------------------------------
// ACTIONS
// ---------------------------------------------------------------------------

function setTab(t) { state.tab = t; render(); }

function setWeek(w) { state.week = w; render(); }

function setActiveDay(d) { state.activeDay = d; render(); }

function toggleExercise(dayId, exId) {
  const cur = getExState(dayId, exId);
  if (!state.checkins[state.week]) state.checkins[state.week] = {};
  if (!state.checkins[state.week][dayId]) state.checkins[state.week][dayId] = {};
  state.checkins[state.week][dayId][exId] = { ...cur, checked: !cur.checked };
  debouncedSave('sabrina-checkins', state.checkins, 250);
  render();
}

function setCarga(dayId, exId, carga) {
  const cur = getExState(dayId, exId);
  if (!state.checkins[state.week]) state.checkins[state.week] = {};
  if (!state.checkins[state.week][dayId]) state.checkins[state.week][dayId] = {};
  state.checkins[state.week][dayId][exId] = { ...cur, carga };
  debouncedSave('sabrina-checkins', state.checkins, 500);
  // não re-renderiza para não perder o foco do campo
}

function setPeso(v) {
  state.perfil.pesoAtual = v;
  debouncedSave('sabrina-perfil', state.perfil, 500);
}

function toggleGuide(i) { state.openGuide = state.openGuide === i ? null : i; render(); }

function toggleWeekEval(w) { state.openWeekEval = state.openWeekEval === w ? null : w; render(); }

function updateAval(w, field, value) {
  if (!state.avaliacao[w]) state.avaliacao[w] = {};
  state.avaliacao[w][field] = value;
  debouncedSave('sabrina-avaliacao', state.avaliacao, 350);
  render();
}

// ---------------------------------------------------------------------------
// RENDER: TREINOS
// ---------------------------------------------------------------------------

function renderTreinos() {
  const workout = WORKOUTS.find(w => w.id === state.activeDay);
  const { done, total } = dayCompletion(state.activeDay);

  let dots = '';
  for (let w = 1; w <= TOTAL_WEEKS; w++) {
    const cls = w === state.week ? 'current' : (w < state.week ? 'past' : '');
    dots += `<button class="dot ${cls}" onclick="setWeek(${w})" title="Semana ${w}"></button>`;
  }

  let pills = '';
  WORKOUTS.forEach(w => {
    const active = w.id === state.activeDay;
    const { done: d, total: t } = dayCompletion(w.id, state.week);
    const complete = d === t;
    pills += `<button class="pill ${active ? 'active' : ''} ${complete ? 'complete' : ''}" onclick="setActiveDay('${w.id}')">
      ${complete && !active ? '✓ ' : ''}${w.letter} · ${esc(w.title)}
    </button>`;
  });

  let exercisesHtml = workout.exercises.map(ex => exerciseRowHtml(workout.id, ex, false)).join('');

  let funcionalHtml = '';
  if (workout.funcional) {
    funcionalHtml = `
      <div class="section-label">Funcional · ${esc(workout.funcional.note)}</div>
      ${workout.funcional.exercises.map(ex => exerciseRowHtml(workout.id, ex, true)).join('')}
    `;
  }

  return `
    <div class="tip-banner">
      <span class="icon">ℹ️</span>
      <div>
        <div class="tip-label">DICA IMPORTANTE</div>
        <div class="tip-text">${esc(DICA_GERAL)}</div>
      </div>
    </div>

    <div class="scoreboard">
      <div class="scoreboard-label">SEMANA ATUAL</div>
      <div><span class="scoreboard-num">${String(state.week).padStart(2, '0')}</span><span class="scoreboard-total">/ ${TOTAL_WEEKS}</span></div>
      <div class="scoreboard-dots">${dots}</div>
    </div>

    <div class="day-pills">${pills}</div>

    <div class="row-summary">
      <span class="count">${done}/${total} concluídos</span>
      ${done === total ? '<span class="done-flag">🔥 treino completo</span>' : ''}
    </div>

    <div style="margin-top:10px;">${exercisesHtml}</div>

    ${funcionalHtml}

    <div class="section-label">Cardio</div>
    <div class="card cardio-card">
      <div class="cardio-icon">🔥</div>
      <div>
        <div class="cardio-dur">${esc(workout.cardio.duration)}</div>
        <div class="cardio-desc">${esc(workout.cardio.desc)}</div>
      </div>
    </div>
  `;
}

function exerciseRowHtml(dayId, ex, noWeight) {
  const st = getExState(dayId, ex.id);
  const showWeight = !(ex.trackWeight === false || noWeight);
  const prev = prevCarga(dayId, ex.id);
  return `
    <div class="exercise-row ${st.checked ? 'checked' : ''}">
      <div class="exercise-top">
        <button class="checkbox ${st.checked ? 'checked' : ''}" onclick="toggleExercise('${dayId}','${ex.id}')">${st.checked ? '✓' : ''}</button>
        <div style="flex:1;">
          <div class="ex-name ${st.checked ? 'checked' : ''}">${esc(ex.name)}</div>
          <div class="ex-meta">${esc(ex.series)}${ex.rest ? ' · descanso ' + esc(ex.rest) : ''}${ex.intensity ? ' · ' + esc(ex.intensity) : ''}</div>
          ${ex.objective ? `<div class="ex-obj">${esc(ex.objective)}</div>` : ''}
        </div>
      </div>
      ${showWeight ? `
        <div class="ex-weight-row">
          <input type="text" inputmode="decimal" placeholder="carga (kg)" value="${esc(st.carga)}" oninput="setCarga('${dayId}','${ex.id}', this.value)" />
          ${prev ? `<span class="ex-prev">semana anterior: ${esc(prev)}kg</span>` : ''}
        </div>` : ''}
    </div>
  `;
}

// ---------------------------------------------------------------------------
// RENDER: GUIA
// ---------------------------------------------------------------------------

function renderGuia() {
  let rpeHtml = RPE_SCALE.map(r => `
    <div class="rpe-row"><span class="rpe-code">${esc(r.code)}</span><span class="rpe-label">${esc(r.label)}</span></div>
  `).join('');

  let guideHtml = GUIDE.map((g, i) => {
    const isOpen = state.openGuide === i;
    return `
      <div class="guide-item ${isOpen ? 'open' : ''}">
        <button class="guide-header" onclick="toggleGuide(${i})">
          <div>
            <div class="guide-name">${esc(g.name)}</div>
            <div class="guide-foco">${esc(g.foco)}</div>
          </div>
          <span class="chevron ${isOpen ? 'rot' : ''}">▾</span>
        </button>
        ${isOpen ? `
          <div class="guide-body">
            <div><div class="guide-line-label" style="color:var(--purple);">COMO FAZER</div><div class="guide-line-text">${esc(g.como)}</div></div>
            <div><div class="guide-line-label" style="color:#B23A3A;">ERRO COMUM</div><div class="guide-line-text">${esc(g.erro)}</div></div>
            <div><div class="guide-line-label" style="color:#B78A00;">DICA PRÁTICA</div><div class="guide-line-text">${esc(g.dica)}</div></div>
          </div>` : ''}
      </div>
    `;
  }).join('');

  return `
    <div class="card" style="background:var(--purple-soft); border:none; margin-bottom:16px;">
      <div style="font-size:12.5px; color:var(--purple); line-height:1.5;">
        Toque em um exercício para ver como executar, o foco muscular, o erro mais comum e uma dica prática.
      </div>
    </div>

    <div class="section-label no-top">Escala de intensidade</div>
    <div class="card" style="margin-bottom:16px;">${rpeHtml}</div>

    <div class="section-label no-top">Exercícios</div>
    ${guideHtml}
  `;
}

// ---------------------------------------------------------------------------
// RENDER: PERFIL
// ---------------------------------------------------------------------------

function renderPerfil() {
  const p = state.perfil;
  const initial = (p.nome || '').trim().charAt(0).toUpperCase() || '?';
  return `
    <div class="profile-header">
      <div class="profile-avatar"><span>${esc(initial)}</span></div>
      <div>
        <div class="profile-name">${esc(p.nome)}</div>
        <div class="profile-age">${esc(p.idade)} anos</div>
      </div>
    </div>

    <div class="section-label">Dados pessoais</div>
    <div class="card">
      <div class="info-row"><span class="info-label">Nome</span><span class="info-value">${esc(p.nome)}</span></div>
      <div class="info-row"><span class="info-label">Idade</span><span class="info-value">${esc(p.idade)} anos</span></div>
    </div>

    <div class="section-label">Peso</div>
    <div class="card">
      <div class="field">
        <div class="field-label">Peso atual</div>
        <div class="field-box">
          <input value="${esc(p.pesoAtual)}" oninput="setPeso(this.value)" />
          <span class="field-suffix">kg</span>
        </div>
      </div>
    </div>

    <div class="section-label">Medidas</div>
    <div class="card">
      <div class="stat-grid">
        <div class="stat-box"><span class="stat-label">Cintura</span><span class="stat-value">${esc(p.cintura)}<span class="stat-suffix">cm</span></span></div>
        <div class="stat-box"><span class="stat-label">Quadril</span><span class="stat-value">${esc(p.quadril)}<span class="stat-suffix">cm</span></span></div>
        <div class="stat-box"><span class="stat-label">Bíceps</span><span class="stat-value">${esc(p.biceps)}<span class="stat-suffix">cm</span></span></div>
        <div class="stat-box"><span class="stat-label">Coxa</span><span class="stat-value">${esc(p.coxa)}<span class="stat-suffix">cm</span></span></div>
      </div>
    </div>

    <div class="section-label">Objetivo e obstáculo</div>
    <div class="card">
      <div class="info-row"><span class="info-label">Objetivo</span><span class="info-value">${esc(p.objetivo)}</span></div>
      <div class="info-row"><span class="info-label">Obstáculo</span><span class="info-value">${esc(p.obstaculo)}</span></div>
    </div>
  `;
}

// ---------------------------------------------------------------------------
// RENDER: PROGRESSO
// ---------------------------------------------------------------------------

function renderProgresso() {
  let weeksHtml = '';
  for (let w = 1; w <= TOTAL_WEEKS; w++) {
    const isOpen = state.openWeekEval === w;
    const data = state.avaliacao[w] || {};
    const filled = AVAL_FIELDS.filter(f => data[f.key] !== undefined && data[f.key] !== '').length;
    const full = filled === AVAL_FIELDS.length;

    let fieldsHtml = AVAL_FIELDS.map(f => {
      if (f.type === 'scale') {
        let btns = [1,2,3,4,5].map(n => `<button class="scale-btn ${data[f.key] === n ? 'active' : ''}" onclick="updateAval(${w}, '${f.key}', ${n})">${n}</button>`).join('');
        return `<div class="aval-row"><span class="aval-label">${esc(f.label)}</span><div class="scale-btns">${btns}</div></div>`;
      }
      return `<div class="aval-row"><span class="aval-label">${esc(f.label)}</span><input type="number" min="0" max="4" placeholder="${esc(f.placeholder||'')}" value="${data[f.key] ?? ''}" oninput="updateAval(${w}, '${f.key}', this.value)" /></div>`;
    }).join('');

    weeksHtml += `
      <div class="week-item ${isOpen ? 'open' : ''}">
        <button class="week-header" onclick="toggleWeekEval(${w})">
          <div style="display:flex; align-items:center; gap:10px;">
            <div class="week-badge ${full ? 'full' : ''}"><span>${w}</span></div>
            <div class="week-title">Semana ${w}</div>
          </div>
          <div style="display:flex; align-items:center; gap:8px;">
            <span class="week-fill">${filled}/${AVAL_FIELDS.length}</span>
            <span class="chevron ${isOpen ? 'rot' : ''}">▾</span>
          </div>
        </button>
        ${isOpen ? `<div class="week-body">${fieldsHtml}</div>` : ''}
      </div>
    `;
  }

  return `
    <div class="card" style="background:var(--purple-soft); border:none; margin-bottom:16px;">
      <div style="font-size:12.5px; color:var(--purple); line-height:1.5;">
        Registre como foi cada semana. A escala vai de 1 (baixo) a 5 (alto) — exceto frequência, que é o número de treinos feitos.
      </div>
    </div>
    ${weeksHtml}
  `;
}

// ---------------------------------------------------------------------------
// MAIN RENDER
// ---------------------------------------------------------------------------

const TAB_META = {
  treinos: 'Treinos',
  guia: 'Guia de execução',
  perfil: 'Perfil',
  progresso: 'Progresso',
};

const NAV_ITEMS = [
  { id: 'treinos', icon: '🏋️', label: 'Treinos' },
  { id: 'guia', icon: '📘', label: 'Guia' },
  { id: 'progresso', icon: '📈', label: 'Progresso' },
  { id: 'perfil', icon: '👤', label: 'Perfil' },
];

function render() {
  const app = document.getElementById('app');

  if (state.loading) {
    app.innerHTML = `<div class="loading-screen">Carregando…</div>`;
    return;
  }

  let contentHtml = '';
  if (state.tab === 'treinos') contentHtml = renderTreinos();
  else if (state.tab === 'guia') contentHtml = renderGuia();
  else if (state.tab === 'perfil') contentHtml = renderPerfil();
  else if (state.tab === 'progresso') contentHtml = renderProgresso();

  let navHtml = NAV_ITEMS.map(item => {
    const active = state.tab === item.id;
    return `
      <button class="navbtn ${active ? 'active' : ''}" onclick="setTab('${item.id}')">
        <span class="icon">${item.icon}</span>
        <span class="lbl">${item.label}</span>
        ${active ? '<span class="navdot"></span>' : ''}
      </button>
    `;
  }).join('');

  app.innerHTML = `
    <div class="phone">
      <div class="topbar"><div class="topbar-title">${TAB_META[state.tab]}</div></div>
      <div class="content">${contentHtml}</div>
      <div class="bottomnav">${navHtml}</div>
      <div class="toast" id="toast">✓ Salvo</div>
    </div>
  `;
}

// ---------------------------------------------------------------------------
// INIT
// ---------------------------------------------------------------------------

(async function init() {
  const [p, c, a] = await Promise.all([
    loadKey('sabrina-perfil', DEFAULT_PERFIL),
    loadKey('sabrina-checkins', {}),
    loadKey('sabrina-avaliacao', {}),
  ]);
  state.perfil = p;
  state.checkins = c;
  state.avaliacao = a;
  state.loading = false;
  render();
})();
</script>
